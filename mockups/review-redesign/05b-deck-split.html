<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>05b · Fan Photo-Reviews — Split — Snapback Review Redesign</title>
<link rel="stylesheet" href="_shared.css">
<style>
  html,body{height:100%}
  body{overflow:hidden}
  .banner{position:fixed;top:0;left:0;right:0;z-index:60;background:var(--ink);color:var(--brand);
    font-family:var(--sans);font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;
    padding:8px 24px;display:flex;justify-content:space-between;gap:14px}
  .banner span:last-child{color:#fff;font-weight:700;text-transform:none;letter-spacing:.3px;opacity:.92}

  /* horizontal snap rail */
  .deck{position:fixed;inset:33px 0 0 0;display:flex;overflow-x:auto;overflow-y:hidden;
    scroll-snap-type:x mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
  .deck::-webkit-scrollbar{display:none}
  .deck{scrollbar-width:none}

  .chap{flex:0 0 100vw;height:100%;scroll-snap-align:start;display:grid;grid-template-columns:1fr 1fr}

  /* photo half */
  .side.photo-side{position:relative;overflow:hidden;border:0;border-radius:0;background:var(--ink)}
  .side.photo-side img{width:100%;height:100%;object-fit:cover;transition:none}
  .side.photo-side::after{content:'';position:absolute;inset:0;
    background:linear-gradient(90deg,rgba(20,20,16,.3),rgba(20,20,16,0) 40%)}
  .chap.photo-right .side.photo-side::after{background:linear-gradient(270deg,rgba(20,20,16,.3),rgba(20,20,16,0) 40%)}
  .areaTag{position:absolute;z-index:3;left:22px;bottom:22px}
  /* CREDIT chip on the photo — binds the shot to its author, top corner */
  .side.photo-side .credit{position:absolute;z-index:3;left:20px;top:20px;font-size:12px;padding:4px 12px 4px 4px}
  .side.photo-side .credit .ini,.side.photo-side .credit .av{width:26px;height:26px;font-size:10px}
  .chap.photo-right .side.photo-side .credit{left:auto;right:20px}

  /* panel half */
  .side.panel{display:flex;flex-direction:column;justify-content:center;
    padding:clamp(30px,5.5vw,84px);position:relative}
  .side.panel.ink{background:var(--ink);color:#fff}
  .side.panel.cream{background:var(--cream);color:var(--ink)}
  .kicker{font-family:var(--sans);font-size:12.5px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;
    color:var(--brand)}
  .side.panel.cream .kicker{color:var(--gold)}

  /* fan byline — avatar + name(+verified) + rating */
  .byline{display:flex;align-items:center;gap:13px;margin:14px 0 22px}
  .byline .ini,.byline .av{width:54px;height:54px;font-size:18px;border-width:2px}
  .byline .av{border-radius:50%;object-fit:cover;background:var(--ink)}
  .byline .who-meta{display:flex;flex-direction:column;gap:3px;min-width:0}
  .byline .who-name{display:flex;align-items:center;gap:8px}
  .byline .nm{font-size:20px}
  .side.panel.ink .byline .nm{color:#fff}
  .byline .vf{width:18px;height:18px;font-size:10px}
  .byline .sub{font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
  .side.panel.ink .byline .sub{color:#c3c2b6}
  .side.panel.cream .byline .sub{color:var(--muted)}
  .byline .rate{font-size:26px;padding:3px 13px;margin-left:auto}

  .quote{font-family:var(--display);font-weight:400;font-size:clamp(26px,3vw,46px);line-height:1.02;
    text-transform:none;letter-spacing:.3px;margin:0 0 18px;max-width:20ch}
  .side.panel.ink .quote{color:#fff}
  .side.panel.cream .quote{color:var(--ink)}
  .quote .mk{color:var(--brand)}
  .body{font-size:clamp(14.5px,1.15vw,17px);line-height:1.55;font-weight:500;max-width:46ch;margin:0}
  .side.panel.ink .body{color:#e9e8dd}
  .side.panel.cream .body{color:#33352f}
  .foot{margin-top:24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .votechip{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:5px 13px;
    font-size:12px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
  .side.panel.ink .votechip{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.24);color:#f1f0e6}
  .side.panel.cream .votechip{background:var(--tip);border:1.5px solid #e7dca0;color:#5a5a52}
  .votechip b{font-family:var(--display);font-weight:400;font-size:15px}
  .side.panel.ink .votechip b{color:var(--brand)}
  .side.panel.cream .votechip b{color:var(--ink)}

  /* title chapter */
  .chap.title .side.panel{justify-content:center}
  .chap.title .home{font-size:14px;font-weight:600;color:#d8d8cf;letter-spacing:.5px;margin-bottom:8px}
  .chap.title .ttl{font-family:var(--display);font-size:clamp(40px,5.2vw,84px);line-height:.92;text-transform:uppercase;
    letter-spacing:1px;margin:6px 0 22px;color:#fff}
  .chap.title .scores{display:flex;gap:12px;flex-wrap:wrap}
  .tcard{border:2px solid rgba(255,255,255,.28);border-radius:13px;padding:12px 18px;min-width:132px}
  .tcard.snap{border-color:var(--brand)}
  .tcard .l{font-size:10.5px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:#cfcfc5;display:flex;gap:5px;align-items:center}
  .tcard .v{font-family:var(--display);font-size:38px;line-height:1;margin-top:6px;color:#fff}
  .tcard.snap .v{color:var(--brand)}
  .tcard .s{font-size:10.5px;font-weight:600;color:#b7b7ad;margin-top:5px}
  .proof{display:flex;align-items:center;gap:12px;margin-top:22px;flex-wrap:wrap}
  .stack{display:flex;padding-left:9px}
  .stack .ini,.stack .av{width:32px;height:32px;margin-left:-9px;border:2px solid var(--ink);box-shadow:0 0 0 1.5px #fff;position:relative}
  .proof .txt{font-size:13px;font-weight:600;color:#e2e1d6}
  .proof .txt b{font-family:var(--display);font-weight:400;font-size:16px;color:var(--brand);margin:0 1px}
  .scrollhint{margin-top:26px;display:inline-flex;align-items:center;gap:10px;font-size:11.5px;font-weight:800;
    letter-spacing:1px;text-transform:uppercase;color:#e9e9df}
  .scrollhint .arw{width:32px;height:32px;border-radius:50%;border:2px solid var(--brand);color:var(--brand);
    display:flex;align-items:center;justify-content:center;animation:nudge 1.4s ease-in-out infinite}
  @keyframes nudge{0%,100%{transform:translateX(0)}50%{transform:translateX(6px)}}

  /* nav arrows */
  .nav{position:fixed;top:calc(33px + (100vh - 33px)/2);transform:translateY(-50%);z-index:50;
    width:52px;height:52px;border-radius:50%;background:var(--brand);color:var(--ink);border:2px solid var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;box-shadow:var(--punch);
    font-family:var(--display);transition:transform .12s ease,opacity .2s ease}
  .nav:hover{transform:translateY(-50%) scale(1.06)}
  .nav:active{transform:translateY(-50%) scale(.96)}
  .nav.prev{left:22px}.nav.next{right:22px}
  .nav.hide{opacity:0;pointer-events:none}

  /* dots */
  .dots{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);z-index:50;display:flex;gap:10px;
    background:rgba(20,20,16,.7);border:1.5px solid rgba(255,255,255,.28);border-radius:999px;padding:9px 14px;
    backdrop-filter:blur(6px)}
  .dots button{width:9px;height:9px;border-radius:50%;border:0;background:rgba(255,255,255,.42);cursor:pointer;padding:0;
    transition:background .2s ease,width .2s ease,border-radius .2s ease}
  .dots button.on{background:var(--brand);width:26px;border-radius:6px}

  /* top progress */
  .pbar{position:fixed;top:33px;left:0;height:3px;background:var(--brand);width:0;z-index:55;transition:width .3s ease}

  @media(max-width:820px){
    .deck{flex-direction:column;overflow-x:hidden;overflow-y:auto;scroll-snap-type:y mandatory}
    .chap{flex:0 0 calc(100vh - 33px);height:calc(100vh - 33px);grid-template-columns:1fr;grid-template-rows:42% 58%}
    .chap.photo-right{grid-template-rows:42% 58%}
    .chap.photo-right .side.photo-side{grid-row:1}
    .chap.photo-right .side.panel{grid-row:2}
    .side.panel{padding:clamp(22px,6vw,40px)}
    .quote{font-size:clamp(24px,7vw,40px)}
    .byline .rate{margin-left:0}
    .nav{display:none}
    .dots{bottom:14px}
  }
</style></head>
<body>

<div class="banner"><span>Concept 05b — Fan Photo-Reviews · Split</span><span>Each fan's photo one half, their name + rating + quote the other</span></div>

<div class="pbar" id="pbar"></div>

<div class="deck" id="deck"></div>

<button class="nav prev hide" id="prev" aria-label="Previous chapter">‹</button>
<button class="nav next" id="next" aria-label="Next chapter">›</button>
<div class="dots" id="dots"></div>

<script src="_crowd.js"></script>
<script>
  const C = window.CROWD, V = C.venue;

  // ---- assemble fan photo-reviews: full reviews + standout photo-tips ----
  const reviewCards = C.reviews.map(r => ({
    kind:'review', by:r.by, rating:r.rating, up:r.up, ago:r.ago, body:r.body, photo:r.photos[0]
  }));
  const topTips = ['atmosphere','best-seats']
    .map(sec => C.tips.find(t => t.section === sec && t.photo && !t.pinned))
    .filter(Boolean)
    .map(t => ({ kind:'tip', by:t.by, up:t.up, ago:t.ago, body:t.text, photo:t.photo }));
  const cards = [...reviewCards, ...topTips]; // 8 fan photo-reviews

  function byline(card, tone){
    const f = C.fans[card.by];
    const label = card.kind === 'review' ? `Fan review · ${card.ago}` : `Photo tip · ${card.ago}`;
    return `<div class="byline">
      ${C.avatar(card.by)}
      <div class="who-meta">
        <span class="who-name"><span class="nm">${f.name}</span>${f.verified?'<span class="vf">✓</span>':''}</span>
        <span class="sub">${label}</span>
      </div>
      <span class="rate">${card.rating != null ? card.rating+'/10' : '★'}</span>
    </div>`;
  }

  // shorten the long review body into a punchy display quote (first sentence)
  function pullQuote(body){
    const first = body.split(/(?<=[.!?])\s/)[0];
    return first.length > 96 ? body.slice(0, 92).trim() + '…' : first;
  }

  const deckEl = document.getElementById('deck');
  const html = [];

  // 0 · TITLE (photo left, ink panel right)
  html.push(`
    <section class="chap title photo-left" data-chap>
      <div class="side photo-side">
        <img src="${C.reviews[0].photos[0].src}" alt="">
        <span class="tag areaTag">${V.city}</span>
        <span class="credit">${C.avatar('grace')}Grace V.</span>
      </div>
      <div class="side panel ink">
        <div class="kicker">The Fan Field Report</div>
        <div class="home" style="margin-top:8px">Home of the ${V.team}</div>
        <div class="ttl">${V.name}</div>
        <div class="scores">
          <div class="tcard snap"><div class="l">★ Snapback</div><div class="v">${V.snap}</div><div class="s">#${V.rank} in the league</div></div>
          <div class="tcard"><div class="l">Fan Score</div><div class="v">${V.fan}</div><div class="s">${V.reviews} reviews</div></div>
        </div>
        <div class="proof">
          <div class="stack" id="stack"></div>
          <span class="txt"><b>${V.fans}</b> fans · <b>${V.reviews}</b> reviews · <b>${V.tips}</b> tips</span>
        </div>
        <div class="scrollhint"><span class="arw">→</span> One fan's photo-review per screen</div>
      </div>
    </section>`);

  // alternate photo side + panel tone each chapter
  cards.forEach((card, i) => {
    const photoRight = i % 2 === 0;      // ch1 photo-right, ch2 photo-left, ...
    const tone = i % 2 === 0 ? 'cream' : 'ink';
    const f = C.fans[card.by];
    const photoHalf = `
      <div class="side photo-side">
        <img src="${card.photo.src}" alt="">
        <span class="tag areaTag">${card.photo.area}</span>
        <span class="credit">${C.avatar(card.by)}${f.name}</span>
      </div>`;
    const panelHalf = `
      <div class="side panel ${tone}">
        <div class="kicker">${card.kind === 'review' ? 'Fan review' : 'Photo tip'} · ${String(i+1).padStart(2,'0')}</div>
        ${byline(card, tone)}
        <p class="quote">“<span class="mk">${pullQuote(card.body).replace(/[""]/g,'')}</span>”</p>
        <p class="body">${card.body}</p>
        <div class="foot"><span class="votechip">▲ <b>${card.up}</b> helpful</span></div>
      </div>`;
    html.push(`
      <section class="chap ${photoRight ? 'photo-right' : 'photo-left'}" data-chap>
        ${photoRight ? panelHalf + photoHalf : photoHalf + panelHalf}
      </section>`);
  });

  deckEl.innerHTML = html.join('');

  const stackIds = ['jack','grace','mike','rob','tommy','danny','sarah','carl'];
  document.getElementById('stack').innerHTML = stackIds.map(id => C.avatar(id)).join('');

  // ---- nav wiring ----
  const deck = deckEl;
  const chaps = [...deck.querySelectorAll('[data-chap]')];
  const dots = document.getElementById('dots');
  const prev = document.getElementById('prev');
  const next = document.getElementById('next');
  const pbar = document.getElementById('pbar');
  let idx = 0;

  const isVertical = () => window.matchMedia('(max-width:820px)').matches;

  chaps.forEach((_, i) => {
    const b = document.createElement('button');
    b.setAttribute('aria-label', 'Chapter ' + (i+1));
    b.addEventListener('click', () => go(i));
    dots.appendChild(b);
  });
  const dotEls = [...dots.children];

  function go(i){
    idx = Math.max(0, Math.min(chaps.length - 1, i));
    if(isVertical()) chaps[idx].scrollIntoView({behavior:'smooth', block:'start'});
    else deck.scrollTo({left: idx * deck.clientWidth, behavior:'smooth'});
    paint();
  }
  function paint(){
    dotEls.forEach((d, i) => d.classList.toggle('on', i === idx));
    prev.classList.toggle('hide', idx === 0);
    next.classList.toggle('hide', idx === chaps.length - 1);
    pbar.style.width = ((idx+1)/chaps.length*100) + '%';
  }

  prev.addEventListener('click', () => go(idx - 1));
  next.addEventListener('click', () => go(idx + 1));

  let raf;
  deck.addEventListener('scroll', () => {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(() => {
      const i = isVertical()
        ? Math.round(deck.scrollTop / deck.clientHeight)
        : Math.round(deck.scrollLeft / deck.clientWidth);
      if(i !== idx){ idx = i; paint(); }
    });
  }, {passive:true});

  window.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight' || e.key === 'ArrowDown'){ e.preventDefault(); go(idx + 1); }
    if(e.key === 'ArrowLeft'  || e.key === 'ArrowUp'){ e.preventDefault(); go(idx - 1); }
  });

  deck.addEventListener('wheel', (e) => {
    if(isVertical()) return;
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      deck.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, {passive:false});

  window.addEventListener('resize', () => go(idx));
  paint();
</script>
</body></html>
