<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Layout 1 · Split hero</title>
<link rel="stylesheet" href="_shared.css">
<style>
  .split { display: grid; grid-template-columns: 1.05fr .95fr; min-height: calc(100vh - 62px); }
  .left { padding: clamp(28px,4vw,56px); display: flex; flex-direction: column; justify-content: center; gap: 22px; }
  .left .eyebrow { color: #8a8a7c; }
  .left h1 { font-family: var(--display); font-size: clamp(40px,4.6vw,74px); text-transform: uppercase; line-height: 1.03; letter-spacing: 1px; margin: 0; max-width: 15ch; }
  .left h1 .hl { display: inline-block; background: var(--brand); color: var(--ink); padding: 0 .12em; box-shadow: 4px 4px 0 var(--ink); }
  .actions { display: flex; gap: 12px; flex-wrap: wrap; }
  .chips { display: flex; gap: 10px; flex-wrap: wrap; }
  .chip { display: inline-flex; align-items: center; gap: 8px; border: 2px solid var(--ink); border-radius: 999px; padding: 9px 14px; font: 800 12.5px var(--sans); text-transform: uppercase; letter-spacing: .4px; background: #fff; box-shadow: var(--punch); }
  .chip .dot { display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; border-radius: 50%; background: var(--a); border: 2px solid var(--ink); color: #fff; }
  .chip.ink .dot { color: var(--ink); }
  .chip .dot .ic { width: 13px; height: 13px; }
  .right { position: relative; color: #fff; padding: clamp(28px,3vw,42px); display: flex; flex-direction: column; gap: 16px; justify-content: center; overflow: hidden; }
  .right::before { content: ''; position: absolute; inset: 0; background: center/cover; background-image: var(--bg); filter: brightness(.5) saturate(1.05); }
  .right::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(12,12,9,.55), rgba(12,12,9,.8)); }
  .right > * { position: relative; z-index: 1; }
  .right .ph { font: 800 12px var(--sans); letter-spacing: 2px; text-transform: uppercase; color: var(--brand); }
  @media (max-width: 820px) { .split { grid-template-columns: 1fr; } .left { min-height: 78vh; } }
</style></head>
<body>
<nav class="nav"><a class="brand" id="brand"></a><span class="burger"><span></span><span></span><span></span></span></nav>
<main class="split">
  <section class="left">
    <span class="eyebrow">Letterboxd for gamedays</span>
    <h1>Where does <span class="hl">gameday</span> take you?</h1>
    <div class="search"><span id="si"></span><input placeholder="Search any team, venue, game or city…"></div>
    <div class="actions">
      <a class="btn brand" id="rankcta"></a>
      <a class="btn dark">See top ranked</a>
    </div>
    <div class="chips" id="chips"></div>
  </section>
  <aside class="right" id="right"></aside>
</main>
<script src="_ui.js"></script>
<script>
  const S = window.SNAP;
  brand.innerHTML = S.cap() + 'SNAPBACK';
  si.innerHTML = S.svg('search');
  rankcta.innerHTML = S.svg('star') + 'Rank a game';
  // explore chips (all six, color-dotted with icon)
  chips.innerHTML = S.dest.map(d => `<a class="chip ${d.ink?'ink':''}" style="--a:${d.accent}"><span class="dot">${S.svg(d.icon)}</span>${d.short}</a>`).join('');
  // right panel: photo bg + tonight slate
  right.style.setProperty('--bg', `url('${S.photos[0]}')`);
  right.innerHTML = `<span class="ph">Live &amp; next up · tonight</span>
    <div style="display:flex;flex-direction:column;gap:10px">${S.games.slice(0,3).map(S.gameRow).join('')}</div>
    <a class="btn ghost" style="align-self:flex-start;margin-top:4px">This weekend →</a>`;
</script>
</body></html>
